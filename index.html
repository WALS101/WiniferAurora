<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Generador de Gráficas</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <h1>Generador de Gráficas</h1>
    
    <div id="step1">
      <label for="chartTitle">Nombre de la tabla:</label>
      <input type="text" id="chartTitle" placeholder="Ej: Ventas Mensuales" />
      
      <label for="chartType">Tipo de gráfica:</label>
      <select id="chartType">
        <option value="bar">Barras verticales</option>
        <option value="pictogram">Barras horizontales</option>
        <option value="pie">Pastel</option>
      </select>

      <button onclick="goToStep2()">Siguiente</button>
    </div>

    <div id="step2" style="display: none;">
      <h2 id="chartTitleDisplay"></h2>

      <label for="dataName">Nombre del dato:</label>
      <input type="text" id="dataName" placeholder="Ej: Enero" />

      <label for="dataValue">Valor:</label>
      <input type="number" id="dataValue" />

      <label for="dataValue">Fecha:</label>
      <input type="text" id="dataDate" placeholder="Ej: Abril 2025 o 01-04-2025" />

      <button onclick="addData()">Agregar dato</button>
      <button onclick="generateChart()">Generar gráfica</button>
      <button onclick="restart()">Volver a empezar</button>

      <div id="dataList"></div>
      <canvas id="chartCanvas"></canvas>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="script.js"></script>
</body>
</html>
